<!DOCTYPE html>

<html>
<head>
    <title>Password Manager</title>
    <link rel="stylesheet" href="design.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app">
        <div class="sidebar">
            <div class="logo">
                <img class="logo-img" src="images/lock.png" alt="logo">
                <p class="logo-text">myAccess</p>
            </div>

            <p class="section-label">DISCOVER</p>
            <a href="#">Dashboard</a>
            <a href="#" class="active">All accounts</a>

            <p class="section-label">LIBRARY</p>
            <a href="#">Folder</a>
            <a href="#">Favorites</a>
            <a href="#">Recent</a>
        </div>

        <div class="main">
            <h2 class="header">Active accounts</h2>

            <div class="search-row">
                <input type="search" class="search-bar" placeholder="Search accounts">
                <a href="#" class="filter">Filter</a>
            </div>

            <hr class="header-line">

            <div class="table">
                <div class="table-header">
                    <div class="space"></div>
                    <p>Title</p>
                    <p>Username</p>
                    <p>Type</p>
                    <p>Date</p>
                </div>

                <div class="account-row">
                    <input type="checkbox" class="checkbox">
                    <p class="title">Github</p>
                    <p class="username">liljaydi</p>
                    <p class="type"><span>Website</span></p>
                    <p class="date">May 20</p>
                </div>

                <div class="account-row">
                    <input type="checkbox" class="checkbox">
                    <p class="title">Instagram</p>
                    <p class="username">gydetaparan@gmail.com</p>
                    <p class="type"><span>Website</span></p>
                    <p class="date">May 20</p>
                </div>

                <div class="account-row">
                    <input type="checkbox" class="checkbox">
                    <p class="title">Facebook</p>
                    <p class="username">gydetaparan@gmail.com</p>
                    <p class="type"><span>Website</span></p>
                    <p class="date">May 20</p>
                </div>

            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
